<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0b" />
  <title>Hors ligne — Atsume</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0b;
      color: #e8e8e8;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem calc(2rem + env(safe-area-inset-bottom));
      text-align: center;
      gap: 1.5rem;
    }

    .icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: oklch(28% 0.01 240);
      border: 1px solid oklch(30% 0.01 240);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }

    .icon svg {
      width: 24px;
      height: 24px;
      color: oklch(60% 0.01 240);
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #e8e8e8;
    }

    p {
      font-size: 0.875rem;
      color: oklch(55% 0.01 240);
      max-width: 280px;
      line-height: 1.5;
    }

    button {
      background: oklch(55% 0.18 260);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 1.25rem;
      height: 44px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; }
  </style>
</head>
<body>
  <div class="icon">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
  </div>

  <div style="display:flex;flex-direction:column;gap:0.5rem;align-items:center">
    <h1>Vous êtes hors ligne</h1>
    <p>Vérifiez votre connexion internet et réessayez. Les pages déjà visitées restent accessibles.</p>
  </div>

  <button onclick="location.reload()">Réessayer</button>
</body>
</html>
