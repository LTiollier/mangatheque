name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'laravel-api/**'
      - 'pwa-client-v2/**'
      - '.github/workflows/ci-cd.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'laravel-api/**'
      - 'pwa-client-v2/**'
      - '.github/workflows/ci-cd.yml'

permissions:
  contents: read
  statuses: write

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./laravel-api
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: pcov

      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Setup .env for testing
        run: |
          cp .env.ci .env
          cp .env.ci .env.testing

      - name: Generate key
        run: php artisan key:generate
          
      - name: Run Migrations
        run: php artisan migrate --force --seed

      - name: Execute tests
        run: ./vendor/bin/pest

      - name: Check code style (Pint)
        run: ./vendor/bin/pint --test

      - name: Static code analysis (Larastan)
        run: ./vendor/bin/phpstan analyse --memory-limit=2G

      - name: Notify Vercel of results
        if: always()
        uses: 'vercel/repository-dispatch/actions/status@v1'
        with:
          name: "Backend CI"

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./pwa-client-v2
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: pwa-client-v2/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Check code style and types
        run: npm run ci

      - name: Build Next.js application
        run: npm run build

      - name: Notify Vercel of results
        if: always()
        uses: 'vercel/repository-dispatch/actions/status@v1'
        with:
          name: "Frontend CI"

  deploy-backend:
    name: Deploy Backend (Laravel)
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Laravel
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ secrets.REMOTE_PATH }}
            git pull origin main
            composer install --no-dev --optimize-autoloader --no-interaction
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan storage:link
            php artisan queue:restart

  deploy-frontend:
    name: Deploy Frontend (Vercel)
    needs: deploy-backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Vercel
        uses: 'vercel/repository-dispatch/actions/status@v1'
        with:
          name: "Vercel - mangatheque: deploy-backend"
